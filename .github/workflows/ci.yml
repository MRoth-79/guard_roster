name: CI

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - '**'

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Show project structure
        run: |
          echo "Running CI for guard_roster"
          ls -la
          find . -maxdepth 3 -type f | sort

      - name: Validate root files exist
        run: |
          test -f index.html
          test -f main.js

      - name: Validate project folders exist
        run: |
          test -d core
          test -d features
          test -d ui
          test -d utils

      - name: Basic JavaScript syntax check
        run: |
          node --check main.js
          find core features ui utils -name "*.js" -print0 | xargs -0 -I {} node --check "{}"
